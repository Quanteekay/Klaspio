name: Deploy to Firebase Hosting on PR

on:
  pull_request:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Crate .env file
        run: cp .env.example .env
        working-directory: gr4-course-hub

      - name: Install dependencies
        run: npm install
        working-directory: gr4-course-hub

      - name: Build project
        run: npm run build
        working-directory: gr4-course-hub

      - name: Deploy Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GR4_COURSE_HUB }}
          projectId: gr4-course-hub
          entryPoint: gr4-course-hub
          channelId: pr-${{ github.event.pull_request.number }}